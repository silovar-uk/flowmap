<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="付箋と囲みを直接操作しながら、業務の流れ・依存関係・補足を整理するワークフローホワイトボード" />
  <meta name="theme-color" content="#f6f7f2" />
  <title>Flowmap — 業務ホワイトボード</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=0.5.0" />
  <link rel="shortcut icon" href="./favicon.svg?v=0.5.0" />
  <link rel="stylesheet" href="./styles.css?v=0.5.0" />
  <link rel="stylesheet" href="./whiteboard.css?v=0.5.0" />
  <script src="./theme.js?v=0.5.0" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js" defer></script>
  <script src="./runtime-fixes.js?v=0.5.0" defer></script>
  <script src="./app.js?v=0.5.0" defer></script>
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <a class="brand" href="#" aria-label="Flowmap ホーム">
        <img src="./favicon.svg?v=0.5.0" alt="" />
        <span class="brand-name">flowmap</span>
        <span class="version-badge">v0.5</span>
      </a>

      <div class="toolbar toolbar-main" aria-label="編集ツール">
        <button id="add-task" class="tool-button primary" type="button" title="付箋を追加">
          <span class="tool-icon">＋</span><span>付箋を追加</span>
        </button>
        <button id="add-group" class="tool-button" type="button" title="囲みを追加">
          <span class="tool-icon">▣</span><span>囲み</span>
        </button>
        <span class="toolbar-divider"></span>
        <button id="auto-layout" class="tool-button" type="button" title="見やすく整える">
          <span class="tool-icon">≋</span><span>整える</span>
        </button>
        <button id="undo-button" class="icon-button" type="button" title="元に戻す">↶</button>
        <button id="redo-button" class="icon-button" type="button" title="やり直す">↷</button>
      </div>

      <div class="toolbar toolbar-view" aria-label="表示操作">
        <div class="zoom-control">
          <button id="zoom-out" class="icon-button" type="button" aria-label="縮小">−</button>
          <button id="zoom-label" class="zoom-label" type="button" title="100%に戻す">100%</button>
          <button id="zoom-in" class="icon-button" type="button" aria-label="拡大">＋</button>
        </div>
        <button id="fit-view" class="tool-button compact" type="button">全体を見る</button>
        <label class="search-box">
          <span>⌕</span>
          <input id="search-input" type="search" placeholder="付箋を検索…" />
          <kbd>⌘K</kbd>
        </label>
        <button id="data-button" class="tool-button compact" type="button">データ</button>
        <button id="print-button" class="tool-button compact" type="button">PDF</button>
      </div>
    </header>

    <main class="workspace">
      <aside id="navigator" class="navigator panel-surface" aria-label="ボード構造ナビゲーター">
        <div class="panel-header">
          <div>
            <div class="panel-kicker">BOARD MAP</div>
            <h2>全体</h2>
          </div>
          <button id="collapse-navigator" class="icon-button subtle" type="button" title="閉じる">‹</button>
        </div>
        <div class="navigator-search-wrap">
          <input id="navigator-search" type="search" placeholder="全体から検索" />
        </div>
        <div id="structure-tree" class="structure-tree"></div>
        <div class="navigator-footer">
          <button id="add-phase" class="outline-button" type="button">＋ フェーズを追加</button>
        </div>
      </aside>

      <section id="canvas-shell" class="canvas-shell" aria-label="フロー編集ホワイトボード">
        <div id="canvas-stage" class="canvas-stage" tabindex="0">
          <div id="world" class="world">
            <svg id="edge-layer" class="edge-layer" width="1800" height="1100" viewBox="0 0 1800 1100" aria-hidden="true">
              <defs>
                <linearGradient id="edgeGradient" x1="0" x2="1">
                  <stop offset="0%" stop-color="#738078" />
                  <stop offset="100%" stop-color="#53635a" />
                </linearGradient>
                <filter id="edgeGlow" x="-30%" y="-30%" width="160%" height="160%">
                  <feGaussianBlur stdDeviation="0" result="blur" />
                  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <marker id="arrowHead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
                  <path d="M0,0 L8,4 L0,8 Z" fill="#68756d" />
                </marker>
              </defs>
              <g id="edges"></g>
              <path id="connection-preview" class="connection-preview" d="" hidden></path>
            </svg>
            <div id="phase-layer" class="phase-layer"></div>
            <div id="group-layer" class="group-layer"></div>
            <div id="node-layer" class="node-layer"></div>
          </div>
        </div>

        <button id="open-navigator" class="floating-panel-button nav-open" type="button" hidden>全体</button>
        <button id="open-inspector" class="floating-panel-button inspector-open" type="button" hidden>補足</button>

        <div class="canvas-hint" id="canvas-hint">
          <strong>空白をダブルクリック</strong>で付箋を追加　・　付箋右端の点からドラッグして接続
        </div>

        <div class="canvas-actions">
          <button id="center-selection" class="canvas-action" type="button" title="選択した付箋を中央へ">◎</button>
          <button id="toggle-grid" class="canvas-action is-active" type="button" title="方眼表示">⌗</button>
        </div>

        <div id="minimap" class="minimap" aria-label="ミニマップ">
          <svg id="minimap-svg" viewBox="0 0 1800 1100"></svg>
          <div class="minimap-controls">
            <button id="minimap-minus" type="button">−</button>
            <button id="minimap-fit" type="button">⌗</button>
            <button id="minimap-plus" type="button">＋</button>
          </div>
        </div>
      </section>

      <aside id="inspector" class="inspector panel-surface" aria-label="選択項目の補足メモ">
        <div class="panel-header inspector-header">
          <div>
            <div class="panel-kicker">NOTE</div>
            <h2 id="inspector-heading">付箋の補足</h2>
          </div>
          <button id="close-inspector" class="icon-button subtle" type="button" title="閉じる">×</button>
        </div>

        <div id="inspector-empty" class="inspector-empty">
          <div class="empty-orbit">□</div>
          <strong>ボードから選択</strong>
          <p>付箋、囲み、矢印に必要な情報を後から書き足せます。</p>
        </div>

        <div id="node-inspector" class="inspector-body" hidden>
          <div class="inspector-title-row">
            <textarea id="field-title" rows="2" maxlength="140" aria-label="作業名"></textarea>
            <select id="field-status" class="status-select" aria-label="状態">
              <option value="todo">未着手</option>
              <option value="doing">対応中</option>
              <option value="waiting">確認待ち</option>
              <option value="done">完了</option>
            </select>
          </div>

          <div class="inspector-tabs" role="tablist">
            <button class="inspector-tab is-active" data-tab="detail" type="button">基本情報</button>
            <button class="inspector-tab" data-tab="checklist" type="button">チェック</button>
            <button class="inspector-tab" data-tab="memo" type="button">補足メモ</button>
          </div>

          <section class="tab-panel is-active" data-tab-panel="detail">
            <div class="form-stack">
              <label><span>期限</span><input id="field-due" type="datetime-local" /></label>
              <label><span>担当</span><input id="field-assignee" type="text" maxlength="80" placeholder="例：広報" /></label>
              <label><span>場所</span><input id="field-location" type="text" maxlength="120" placeholder="例：コルソ1階" /></label>
              <label><span>関連リンク</span><input id="field-link" type="url" placeholder="https://" /></label>
              <label><span>所属する囲み</span><select id="field-group"></select></label>
              <label class="toggle-row"><input id="field-overview" type="checkbox" /><span>PDFの全体図に表示</span></label>
            </div>
          </section>

          <section class="tab-panel" data-tab-panel="checklist">
            <div class="checklist-summary">
              <div><strong id="checklist-count">0 / 0 完了</strong><span>チェック進捗</span></div>
              <div class="progress-track"><i id="checklist-bar"></i></div>
            </div>
            <div id="checklist-editor" class="checklist-editor"></div>
            <button id="add-check-item" class="outline-button" type="button">＋ チェックを追加</button>
          </section>

          <section class="tab-panel" data-tab-panel="memo">
            <label class="memo-field"><span>補足</span><textarea id="field-note" rows="8" maxlength="2000" placeholder="進め方、注意事項、場所の案内など"></textarea></label>
          </section>

          <div class="inspector-danger-zone">
            <button id="delete-node" class="danger-button" type="button">付箋を削除</button>
          </div>
        </div>

        <div id="edge-inspector" class="inspector-body" hidden>
          <div class="relation-card">
            <span class="relation-label">前後関係</span>
            <strong id="edge-summary">作業A → 作業B</strong>
            <p>矢印は、先に終える作業と、その後に進む作業を示します。</p>
          </div>
          <div class="form-stack">
            <label><span>接続元</span><select id="edge-from"></select></label>
            <label><span>接続先</span><select id="edge-to"></select></label>
          </div>
          <button id="reverse-edge" class="outline-button" type="button">矢印を反転</button>
          <button id="delete-edge" class="danger-button full" type="button">矢印を削除</button>
        </div>

        <div id="group-inspector" class="inspector-body" hidden>
          <div class="form-stack">
            <label><span>囲みの名前</span><input id="group-title-field" type="text" maxlength="80" /></label>
            <label><span>マーカー色</span><select id="group-color-field">
              <option value="blue">ブルー</option>
              <option value="green">グリーン</option>
              <option value="orange">オレンジ</option>
              <option value="purple">パープル</option>
              <option value="cyan">シアン</option>
            </select></label>
          </div>
          <button id="toggle-group-collapse" class="outline-button" type="button">折りたたむ</button>
          <button id="delete-group" class="danger-button full" type="button">囲みを削除</button>
        </div>
      </aside>
    </main>
  </div>

  <dialog id="data-dialog" class="app-dialog">
    <form method="dialog">
      <header><div><span>DATA</span><h2>データの入出力</h2></div><button value="cancel" aria-label="閉じる">×</button></header>
      <div class="dialog-grid">
        <button id="export-json" type="button"><strong>JSONを書き出す</strong><span>完全なバックアップ</span></button>
        <button id="export-yaml" type="button"><strong>YAMLを書き出す</strong><span>読みやすい一括編集用</span></button>
        <label><strong>ファイルを読み込む</strong><span>JSON / YAML</span><input id="import-file" type="file" accept=".json,.yaml,.yml" /></label>
        <button id="reset-sample" type="button"><strong>サンプルへ戻す</strong><span>現在の内容を初期化</span></button>
      </div>
    </form>
  </dialog>

  <div id="toast-region" class="toast-region" aria-live="polite"></div>
  <section id="print-sheet" class="print-sheet" aria-hidden="true"></section>
</body>
</html>
